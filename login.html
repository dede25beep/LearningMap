<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Logar </title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
   
    <section id="login">
        <div>
            <form action="/login" method="post"></form>
                <h1> Entrar </h1>
                <input type="text" id="name_login" placeholder="Nome" >
                <input type="password" id="password-login" placeholder="Senha" >
                <p> Não tem conta? <a href="#register"> Cadastre-se </a></p>
        
                <div class="google-login">
                    <div id="g_id_onload"
                        data-client_id="SEU_CLIENT_ID"
                        data-context="signin"
                        data-ux_mode="popup"
                        data-callback="handleCredentialResponse">
                    </div>

                    <div class="g_id_signin"
                        data-type="standard"
                        data-shape="pill"
                        data-theme="outline"
                        data-text="signin_with"
                        data-size="large">
                    </div>
                </div>
            </form>
        </div>
        
    </section>


    <section id="register">
        <div>
            <form action="/register" method="post"></form>
                <h1> Cadastre-se </h1> 
                <input type="text" id="name_register" placeholder="Novo usuário" >
                <input type="password" id="password-register" placeholder="Nova senha" >
                <p> Já tem conta? <a href="#login"> Voltar </a></p>
            </form>
        </div>
    </section>
    




    
    <script src="script.js"></script>
</body>
</html>
